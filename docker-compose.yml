version: "3.9"

services:
  vs-opencode:
    build: .
    container_name: vs-opencode
    ports:
      - "4096:4096"
    environment:
      - OPENCODE_PORT=4096
      - OPENCODE_HOSTNAME=0.0.0.0
      - CODE_TUNNEL_NAME=vs-opencode
    volumes:
      - vs-opencode-home:/home/vsopencode

volumes:
  vs-opencode-home:
